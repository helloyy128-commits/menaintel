const SourceChip = ({source}) => (
  <a href={source.url} target="_blank" rel="noopener noreferrer" style={{
    display:"inline-flex",alignItems:"center",gap:6,padding:"4px 10px",borderRadius:20,
    border:`1px solid ${C.border}`,background:C.faint,fontSize:12,color:"#334155",
    textDecoration:"none",fontFamily:"'DM Mono',monospace",cursor:"pointer"}}
    onMouseEnter={e=>{e.currentTarget.style.background=C.dark;e.currentTarget.style.color="#f8fafc";e.currentTarget.style.borderColor=C.dark;}}

    <TierBadge tier={source.tier}/>
    {source.paywall && <span title="Paywalled">🔒</span>}
    {source.name}
    <span style={{opacity:0.45}}>{source.date}</span>
    <span style={{fontSize:10,opacity:0.4}}>↗</span>

const CategoryTag = ({category,color}) => (

// ─── DYNAMIC EXECUTIVE SUMMARY ───────────────────────────────────────────────
const ExecSummary = ({competitor, filteredInsights}) => {
  const corroborated = filteredInsights.filter(i=>i.corroborated).length;
  const total = filteredInsights.length;

  const getSummaryText = () => {
    if (competitor === "All") {
      return [
        <p key="1" style={{fontSize:15,lineHeight:1.85,margin:"0 0 14px",fontFamily:"'Georgia',serif",color:"#cbd5e1"}}>
          <span style={{color:"#f8fafc",fontWeight:600}}>Talabat dominates the week</span> across two fronts: Q1 2026 results (12 May) beat guidance with GMV up 18% to $2.7B and raised full-year net income guidance to $300-330M, while its Cairo hub — MENA's largest at 27,000 sqm — became operational 28 April, processing up to 1 million items daily across 12 Egyptian cities.
        </p>,
        <p key="2" style={{fontSize:15,lineHeight:1.85,margin:"0 0 14px",fontFamily:"'Georgia',serif",color:"#cbd5e1"}}>
          <span style={{color:"#f8fafc",fontWeight:600}}>Three IPO stories converge:</span> Noon confirmed its dual UAE-Saudi listing within 24 months at ~$10B valuation; Ninja is lining up Goldman Sachs and Citi for a $1B Tadawul debut; Careem is approaching IPO-readiness after its first profitable year.
        </p>,
        <p key="3" style={{fontSize:14,lineHeight:1.8,margin:0,fontFamily:"'Georgia',serif",color:"#64748b",fontStyle:"italic"}}>
          ⚠ Monitoring: Alshaya Group's regulatory push against Shein/Temu at the UAE-Kuwait Economic Forum (2 Feb) — watch for GCC government response in H2 2026.
        </p>
      ];
    }
    const items = filteredInsights.slice(0,3);
    if (items.length === 0) return [<p key="0" style={{fontSize:15,fontFamily:"'Georgia',serif",color:"#94a3b8"}}>No stories found for {competitor} in today's feed.</p>];
    return [
      <p key="1" style={{fontSize:15,lineHeight:1.85,margin:"0 0 10px",fontFamily:"'Georgia',serif",color:"#cbd5e1"}}>
        <span style={{color:"#f8fafc",fontWeight:600}}>{competitor}</span> appears in {total} story{total!==1?"s":""} today{corroborated>0?`, of which ${corroborated} ${corroborated===1?"is":"are"} fully corroborated`:""}.
      </p>,
      ...items.map((ins,i) => (
        <p key={i+2} style={{fontSize:14,lineHeight:1.75,margin:"0 0 8px",fontFamily:"'Georgia',serif",color:"#94a3b8"}}>
          <span style={{color:"#cbd5e1",fontWeight:600}}>{ins.category}:</span> {ins.headline}
        </p>
      ))
    ];
  };

  const stats = competitor === "All"
    ? [{label:"Stories",value:"21"},{label:"Corroborated",value:"8 / 21"},{label:"Talabat Q1 GMV",value:"$2.7B"},{label:"Markets",value:"UAE · KSA · EGY · TR · ZA"}]
    : [{label:"Stories",value:String(total)},{label:"Corroborated",value:`${corroborated} / ${total}`},{label:"Viewing",value:competitor}];

  return (
    <div style={{background:`linear-gradient(135deg,${C.dark} 0%,${C.darkMid} 100%)`,borderRadius:14,padding:"24px 28px",marginBottom:24}}>
      <p style={{fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",color:"#475569",fontFamily:"'DM Mono',monospace",margin:"0 0 14px"}}>
        {competitor === "All" ? "Executive Summary" : `Summary · ${competitor}`} · 16 May 2026
      </p>
      {getSummaryText()}
      <div style={{display:"flex",flexWrap:"wrap",gap:24,marginTop:20,paddingTop:16,borderTop:"1px solid rgba(255,255,255,0.07)"}}>
        {stats.map(s=>(

                {insight.sections.map((sec,si)=>(
                  <div key={si} style={{marginTop:22}}>
                    <p style={{fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:insight.categoryColor,fontFamily:"'DM Mono',monospace",margin:"0 0 8px",display:"flex",alignItems:"center",gap:8}}>
                      <span style={{display:"inline-block",width:18,height:2,background:insight.categoryColor,borderRadius:1}}/>
                      {sec.theme}
                    </p>
                    <p style={{fontSize:14,lineHeight:1.85,color:"#334155",margin:0,fontFamily:"'Georgia',serif"}}>{sec.body}</p>
                  </div>
                ))}
                <div style={{marginTop:22,paddingTop:16,borderTop:`1px solid ${C.faint}`}}>
                  <p style={{fontSize:10,color:C.subtle,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 0 8px"}}>Sources</p>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {insight.sources.map((s,i)=><SourceChip key={i} source={s}/>)}
                  </div>
                </div>
              </div>
            </div>
          ))}
        </div>
      }
    </div>
  );
};

// ─── SAVED TAB ───────────────────────────────────────────────────────────────
const SavedTab = ({bookmarks,tags}) => {
  const savedInsights = INSIGHTS.filter(i=>bookmarks.includes(i.id));
  const tagFreq = {};
  savedInsights.forEach(i=>{if(i.competitor){tagFreq[i.competitor]=(tagFreq[i.competitor]||0)+1;}});
  const total = Object.values(tagFreq).reduce((a,b)=>a+b,0)||1;

  return (
    <div style={{maxWidth:720,margin:"0 auto"}}>
      <div style={{marginBottom:24}}>
        <p style={{fontSize:11,color:C.subtle,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 0 4px"}}>Your Library</p>
        <h2 style={{fontSize:22,fontWeight:700,color:C.dark,margin:0,fontFamily:"'DM Sans',sans-serif"}}>Saved Articles</h2>
      </div>

      {savedInsights.length>0&&(
        <div style={{background:`linear-gradient(135deg,${C.dark} 0%,${C.darkMid} 100%)`,borderRadius:14,padding:"22px 26px",marginBottom:24}}>
          <p style={{fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",color:"#475569",fontFamily:"'DM Mono',monospace",margin:"0 0 12px"}}>What the app has learned from your saves</p>
          <p style={{fontSize:14,lineHeight:1.75,color:"#cbd5e1",fontFamily:"'Georgia',serif",margin:"0 0 18px"}}>
            Based on <span style={{color:"#f8fafc",fontWeight:600}}>{savedInsights.length} saved article{savedInsights.length!==1?"s":""}</span>, you are tracking: {Object.entries(tagFreq).map(([k,v])=>`${k} (${Math.round(v/total*100)}%)`).join(", ")}.
          </p>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {Object.entries(tagFreq).map(([tag,count])=>(
              <div key={tag} style={{display:"flex",alignItems:"center",gap:12}}>
                <span style={{fontSize:11,color:"#94a3b8",fontFamily:"'DM Mono',monospace",width:120,flexShrink:0}}>{tag}</span>
                <div style={{flex:1,height:6,background:"rgba(255,255,255,0.08)",borderRadius:3,overflow:"hidden"}}>
                  <div style={{width:`${(count/total)*100}%`,height:"100%",background:"#3b82f6",borderRadius:3}}/>
                </div>
                <span style={{fontSize:11,color:"#64748b",fontFamily:"'DM Mono',monospace",width:32,textAlign:"right"}}>{Math.round(count/total*100)}%</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {savedInsights.length===0
        ? <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:28,textAlign:"center"}}>
            <p style={{fontSize:14,color:C.muted,fontFamily:"'DM Sans',sans-serif"}}>No saved articles yet. Star stories on the Today tab to save them here.</p>
          </div>
        : <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {savedInsights.map(article=>(
            <div key={article.id} style={{border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 18px",background:C.surface,display:"flex",alignItems:"flex-start",gap:14}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                  <CategoryTag category={article.category} color={article.categoryColor}/>
                </div>
                <p style={{margin:"0 0 8px",fontSize:14,fontWeight:600,color:C.dark,fontFamily:"'DM Sans',sans-serif",lineHeight:1.4}}>{article.headline}</p>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {article.sources.slice(0,1).map((s,i)=><SourceChip key={i} source={s}/>)}
                </div>
              </div>
              <span style={{color:"#f59e0b",fontSize:18,flexShrink:0}}>★</span>
            </div>
          ))}
        </div>
      }
    </div>
  );
};

// ─── SETTINGS TAB ────────────────────────────────────────────────────────────
const SettingsTab = ({tags,setTags}) => {
  const [input,setInput] = useState("");
  const addTag = () => {
    const t=input.trim();
    if(!t||tags.find(x=>x.label.toLowerCase()===t.toLowerCase()))return;
    setTags([...tags,{id:Date.now(),label:t,active:true,priority:tags.length+1}]);
    setInput("");
  };
  const removeTag = id=>setTags(tags.filter(t=>t.id!==id));
  const toggleTag = id=>setTags(tags.map(t=>t.id===id?{...t,active:!t.active}:t));
  const moveTag = (id,dir)=>{
    const idx=tags.findIndex(t=>t.id===id);
    if(dir==="up"&&idx===0)return;
    if(dir==="down"&&idx===tags.length-1)return;
    const n=[...tags];const sw=dir==="up"?idx-1:idx+1;
    [n[idx],n[sw]]=[n[sw],n[idx]];
    setTags(n.map((t,i)=>({...t,priority:i+1})));
  };

  return (
    <div style={{maxWidth:720,margin:"0 auto"}}>
      <div style={{marginBottom:28}}>
        <p style={{fontSize:11,color:C.subtle,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 0 4px"}}>Personalisation</p>
        <h2 style={{fontSize:22,fontWeight:700,color:C.dark,margin:"0 0 8px",fontFamily:"'DM Sans',sans-serif"}}>Interest Profile</h2>
        <p style={{fontSize:14,color:C.muted,margin:0,fontFamily:"'Georgia',serif",lineHeight:1.6}}>These tags tell the app what to surface first. Higher priority = ranked first in your daily feed.</p>
      </div>

      <div style={{marginBottom:28}}>
        <p style={{fontSize:11,color:C.subtle,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 0 10px"}}>Add a new focus area</p>
        <div style={{display:"flex",gap:8}}>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTag()}
            placeholder="e.g. Egypt grocery delivery, Noon logistics..."
            style={{flex:1,padding:"10px 14px",borderRadius:10,border:`1px solid ${C.border}`,fontSize:14,fontFamily:"'DM Sans',sans-serif",color:C.dark,outline:"none"}}
            onFocus={e=>e.target.style.borderColor=C.dark} onBlur={e=>e.target.style.borderColor=C.border}/>
          <button onClick={addTag} style={{padding:"10px 20px",borderRadius:10,border:"none",background:C.dark,color:"#f8fafc",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>+ Add</button>
        </div>
      </div>

      <div style={{marginBottom:28}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <p style={{fontSize:11,color:C.subtle,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:"0.08em",margin:0}}>Priority order</p>
          <span style={{fontSize:11,color:C.subtle,fontFamily:"'DM Mono',monospace"}}>{tags.filter(t=>t.active).length} active</span>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {tags.map((tag,idx)=>(
            <div key={tag.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",borderRadius:12,border:`1px solid ${tag.active?"#bfdbfe":C.border}`,background:tag.active?"#eff6ff":C.faint,opacity:tag.active?1:0.5}}>
              <span style={{fontSize:12,fontWeight:700,fontFamily:"'DM Mono',monospace",color:tag.active?"#1d4ed8":C.subtle,width:20,textAlign:"center",flexShrink:0}}>{idx+1}</span>
              <span style={{flex:1,fontSize:14,fontWeight:500,color:tag.active?C.dark:C.muted,fontFamily:"'DM Sans',sans-serif"}}>{tag.label}</span>
              <div style={{display:"flex",gap:4,alignItems:"center"}}>
                <button onClick={()=>moveTag(tag.id,"up")} style={{background:"none",border:"none",cursor:"pointer",color:C.subtle,fontSize:14,padding:"2px 4px"}}>↑</button>
                <button onClick={()=>moveTag(tag.id,"down")} style={{background:"none",border:"none",cursor:"pointer",color:C.subtle,fontSize:14,padding:"2px 4px"}}>↓</button>
                <button onClick={()=>toggleTag(tag.id)} style={{padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"'DM Mono',monospace",border:`1px solid ${tag.active?"#93c5fd":C.border}`,background:tag.active?"#dbeafe":C.surface,color:tag.active?"#1d4ed8":C.subtle}}>
                  {tag.active?"Active":"Paused"}
                </button>
                <button onClick={()=>removeTag(tag.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#fca5a5",fontSize:16,padding:"2px 4px"}}
                  onMouseEnter={e=>e.currentTarget.style.color=C.red} onMouseLeave={e=>e.currentTarget.style.color="#fca5a5"}>×</button>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div style={{background:C.faint,borderRadius:12,padding:"18px 20px",border:`1px solid ${C.border}`}}>
        <p style={{fontSize:11,color:C.subtle,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 0 10px"}}>How this influences your feed</p>
        {[{rank:"1st",label:"Interest profile",desc:"Active tags, in priority order — always ranks highest"},
          {rank:"2nd",label:"Bookmark behaviour",desc:"What you save teaches the app your implicit preferences"},
          {rank:"3rd",label:"Editorial baseline",desc:"Source tier + corroboration — non-negotiable floor"}].map(row=>(
          <div key={row.rank} style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:8}}>
            <span style={{fontSize:11,fontWeight:700,fontFamily:"'DM Mono',monospace",color:"#1d4ed8",width:28,flexShrink:0}}>{row.rank}</span>
            <div><span style={{fontSize:13,fontWeight:600,color:C.dark,fontFamily:"'DM Sans',sans-serif"}}>{row.label} </span><span style={{fontSize:13,color:C.muted,fontFamily:"'Georgia',serif"}}>— {row.desc}</span></div>
          </div>
        ))}
      </div>
    </div>
  );
};

// ─── MAIN APP ────────────────────────────────────────────────────────────────
function App() {
  const [activeTab,setActiveTab] = useState("today");
  const [tags,setTags] = useState(INITIAL_TAGS);
  const [bookmarks,setBookmarks] = useState([]);
  const [competitor,setCompetitor] = useState("All");

  const toggleBookmark = id=>setBookmarks(prev=>prev.includes(id)?prev.filter(b=>b!==id):[...prev,id]);

  const tabs = [
    {id:"today",label:"Today"},
    {id:"trends",label:"Trends"},
    {id:"saved",label:`Saved${bookmarks.length>0?` (${bookmarks.length})`:""}`},
    {id:"settings",label:"⚙ Profile"},
  ];

  return (
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"'DM Sans',sans-serif"}}>
      <div style={{position:"sticky",top:0,zIndex:10,background:"rgba(248,250,252,0.96)",backdropFilter:"blur(8px)",borderBottom:`1px solid ${C.border}`,padding:"0 24px",display:"flex",alignItems:"center",gap:4}}>
        <span style={{fontSize:13,fontWeight:700,color:C.dark,fontFamily:"'DM Sans',sans-serif",marginRight:16,padding:"14px 0",letterSpacing:"-0.02em"}}>
          MENA<span style={{color:"#3b82f6"}}>intel</span>
        </span>
        {tabs.map(tab=>(
          <button key={tab.id} onClick={()=>setActiveTab(tab.id)} style={{
            padding:"14px 16px",border:"none",background:"none",fontSize:13,
            fontWeight:activeTab===tab.id?700:500,color:activeTab===tab.id?C.dark:C.muted,
            cursor:"pointer",fontFamily:"'DM Sans',sans-serif",
            borderBottom:activeTab===tab.id?`2px solid ${C.dark}`:"2px solid transparent",
            transition:"all 0.15s"}}>{tab.label}</button>
        ))}
      </div>
      <div style={{padding:"32px 24px 60px"}}>
        {activeTab==="today"&&<TodayTab tags={tags} bookmarks={bookmarks} onBookmark={toggleBookmark} competitor={competitor} setCompetitor={setCompetitor} setActiveTab={setActiveTab}/>}
        {activeTab==="trends"&&<TrendsTab competitor={competitor} setCompetitor={setCompetitor}/>}
        {activeTab==="saved"&&<SavedTab bookmarks={bookmarks} tags={tags}/>}
        {activeTab==="settings"&&<SettingsTab tags={tags} setTags={setTags}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
