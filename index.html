// Clean up internal feed names to display nicely
function cleanSourceName(name) {
  if(!name) return 'Unknown';
  // Remove backfill prefix
  if(name.startsWith('Backfill: ')) name = name.replace('Backfill: ','');
  // Clean Google News feed names
  if(name.startsWith('GNews: ')) name = name.replace('GNews: ','') + ' (via Google News)';
  // Truncate month suffixes like "MENA Ecommerce Mar" → "MENA Ecommerce"
  name = name.replace(/\s+(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)('?\d{0,2})?$/,'');
  name = name.replace(/\s+\d{4}$/,'');
  return name.trim();
}

function boldCompanies(text) {
  // Split into parts, bolding company names
  const parts = [];
  let remaining = text;
  const pattern = new RegExp('('+COMPANY_NAMES.join('|')+')','g');
  let lastIndex = 0;
  let match;
  pattern.lastIndex = 0;
  const re = new RegExp('\\b('+COMPANY_NAMES.join('|')+')\\b','g');
  const segments = [];
  let last = 0;
  let m;
  while((m = re.exec(text)) !== null) {
    if(m.index > last) segments.push({type:'text', val:text.slice(last, m.index)});
    segments.push({type:'bold', val:m[0]});
    last = m.index + m[0].length;
  }
  if(last < text.length) segments.push({type:'text', val:text.slice(last)});
  return segments.map((s,i) => s.type==='bold'
    ? React.createElement('strong',{key:i,style:{fontWeight:700,color:"#1c1917"}},s.val)
    : React.createElement('span',{key:i},s.val)
  );
}

    React.createElement('p',{style:{fontSize:14,color:"#92400e",fontFamily:"'Georgia',serif",fontStyle:"italic",margin:0}},"Summary generates automatically — check back shortly.")
  );

  // Parse themes — split on "Theme:" or "Quick Commerce:" etc pattern
  const themeRegex = /(?:^|\n)([A-Z][A-Za-z &\/]+):\s*/g;
  const themes = [];
  let lastEnd = 0;
  let tm;
  const cleanContent = content.replace(/\*\*/g,'').trim();

  // Parse themes — handle two formats:
  // Format A: "Theme Name: body text" 
  // Format B: "Theme: Theme Name. body text" or "Theme: Theme Name — body text"
  const themeMatches = [];

  // First try Format B: "Theme:" keyword followed by name
  const formatB = /(?:^|\n)Theme:\s*([^.\n—–-][^.\n]{3,50})[.—–-]\s*/g;
  const formatBMatches = [];
  let fb;
  const testB = formatB.test(cleanContent);
  formatB.lastIndex = 0;
  while((fb = formatB.exec(cleanContent)) !== null) {
    formatBMatches.push({index: fb.index, label: fb[1].trim(), end: fb.index + fb[0].length});
  }

  if(formatBMatches.length > 0) {
    // Use Format B matches
    formatBMatches.forEach((t,i) => {
      const textStart = t.end;
      const textEnd = i < formatBMatches.length-1 ? formatBMatches[i+1].index : cleanContent.length;
      const body = cleanContent.slice(textStart, textEnd).trim();
      if(body) themes.push({label: t.label, body});

  } else {
    // Try Format A: "Theme Name: body"
    const tr = /(?:^|\n)((?:[A-Z][A-Za-z]+(?:\s+[A-Za-z&\/\-]+){1,5})):\s*/g;
    let tm2;
    while((tm2 = tr.exec(cleanContent)) !== null) {
      // Skip if label is just "Theme" alone
      if(tm2[1].trim().toLowerCase() === 'theme') continue;
      themeMatches.push({index: tm2.index, label: tm2[1].trim(), end: tm2.index + tm2[0].length});
    }
    themeMatches.forEach((t,i) => {
      const textStart = t.end;
      const textEnd = i < themeMatches.length-1 ? themeMatches[i+1].index : cleanContent.length;
      const body = cleanContent.slice(textStart, textEnd).trim();
      if(body) themes.push({label: t.label, body});
    });
  }

  const hasThemes = themes.length > 1;
  const visibleThemes = expanded ? themes : themes.slice(0,1);

          React.createElement('button',{onClick:()=>setSortBy("relevant"),style:{padding:"6px 16px",border:"none",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",background:sortBy==="relevant"?C.dark:C.surface,color:sortBy==="relevant"?"#f8fafc":C.muted,borderLeft:"0.5px solid "+C.border,transition:"all 0.15s"}},"Most relevant")

      ),

      loading
        ? React.createElement('div',{className:"loading"},"Fetching latest intelligence...")
        : filtered.length===0
          ? React.createElement('div',{style:{background:C.faint,borderRadius:10,padding:24,textAlign:"center"}},
              React.createElement('p',{style:{fontSize:15,color:C.muted,fontFamily:"'DM Sans',sans-serif"}},search?"No results for \""+search+"\". Try different keywords.":"No stories match your current filters.")
            )
          : React.createElement('div',null,
              React.createElement('div',{style:{display:"flex",flexDirection:"column",gap:8}},
                filtered.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE).map(insight=>React.createElement(InsightCard,{
                  key:insight.id,
                  insight:{...insight,sources:articleMap[insight.id]||[]},
                  saved:bookmarks.includes(insight.id),
                  onBookmark,
                  expanded:expanded===insight.id,
                  onExpand:()=>setExpanded(expanded===insight.id?null:insight.id)
                }))
              ),
              filtered.length>PAGE_SIZE && React.createElement(Pagination,{
                page,totalPages:Math.ceil(filtered.length/PAGE_SIZE),
                onChange:p=>{setPage(p);setExpanded(null);window.scrollTo(0,0);}
              })
            )

// ─── SNAPSHOT TAB ─────────────────────────────────────────────────────────────
const QUARTERS = [
  {key:"Q1 2026",label:"Q1 2026",months:["January 2026","February 2026","March 2026"]},
  {key:"Q2 2026",label:"Q2 2026",months:["April 2026","May 2026","June 2026"]},
  {key:"Q3 2026",label:"Q3 2026",months:["July 2026","August 2026","September 2026"]},
  {key:"Q4 2026",label:"Q4 2026",months:["October 2026","November 2026","December 2026"]},
];

const ALL_MONTHS = [
  {key:"January 2026",label:"Jan'26",quarter:"Q1 2026"},
  {key:"February 2026",label:"Feb'26",quarter:"Q1 2026"},
  {key:"March 2026",label:"Mar'26",quarter:"Q1 2026"},
  {key:"April 2026",label:"Apr'26",quarter:"Q2 2026"},
  {key:"May 2026",label:"May'26",quarter:"Q2 2026"},
];

const PERIOD_RANGES = {
  'January 2026':  ['2026-01-01','2026-02-01'],
  'February 2026': ['2026-02-01','2026-03-01'],
  'March 2026':    ['2026-03-01','2026-04-01'],
  'April 2026':    ['2026-04-01','2026-05-01'],
  'May 2026':      ['2026-05-01','2026-06-01'],
  'Q1 2026':       ['2026-01-01','2026-04-01'],
  'Q2 2026':       ['2026-04-01','2026-07-01'],
};

function SnapshotTab() {
  const [activeQuarter,setActiveQuarter] = useState(null); // null = YTD
  const [activeMonth,setActiveMonth] = useState(null);
  const [markets,setMarkets] = useState([]); // multi-select
  const [companies,setCompanies] = useState([]); // multi-select
  const [search,setSearch] = useState("");
  const [sortBy,setSortBy] = useState("relevant");
  const [summary,setSummary] = useState(null);
  const [insights,setInsights] = useState([]);
  const [articleMap,setArticleMap] = useState({});
  const [loading,setLoading] = useState(true);
  const [summaryLoading,setSummaryLoading] = useState(false);
  const [expanded,setExpanded] = useState(null);
  const [visibleCount,setVisibleCount] = useState(10);
  const [page,setPage] = useState(1);
  const PAGE_SIZE = 10;

  // Determine active period key
  const activePeriod = activeMonth || activeQuarter; // null = YTD

  // Which months are enabled given quarter selection
  const enabledMonths = activeQuarter
    ? ALL_MONTHS.filter(m=>m.quarter===activeQuarter)
    : ALL_MONTHS;

  // Quarter tab click
  const handleQuarterClick = (qkey) => {
    if(activeQuarter===qkey) { setActiveQuarter(null); setActiveMonth(null); } // deselect = YTD
    else { setActiveQuarter(qkey); setActiveMonth(null); }
  };

  // Month tab click
  const handleMonthClick = (mkey) => {
    const month = ALL_MONTHS.find(m=>m.key===mkey);
    if(!month) return;
    // If clicking month in a different quarter, switch quarter too
    if(activeMonth===mkey) { setActiveMonth(null); } // deselect month, stay on quarter
    else { setActiveMonth(mkey); setActiveQuarter(month.quarter); }
  };

  // Toggle multi-select market
  const toggleMarket = (id) => {
    if(id==="all") { setMarkets([]); return; }
    setMarkets(prev=>prev.includes(id)?prev.filter(m=>m!==id):[...prev,id]);
  };

  // Toggle multi-select company
  const toggleCompany = (c) => {
    if(c==="All") { setCompanies([]); return; }
    setCompanies(prev=>prev.includes(c)?prev.filter(x=>x!==c):[...prev,c]);
  };

  useEffect(()=>{
    async function load() {
      setLoading(true);
      setExpanded(null);
      setArticleMap({});
      setVisibleCount(10);

      // Fetch summary if specific period selected
      if(activePeriod) {
        setSummaryLoading(true);
        const {data:s, error:sErr} = await sb.from('summaries').select('*').eq('period_label',activePeriod).maybeSingle();
        if(sErr) console.log('Summary fetch error:', sErr);
        if(s && s.content) {
          const cleaned = s.content.replace(/\*\*/g,'').replace(/^#+\s*/gm,'').replace(/EXECUTIVE SUMMARY:.*\n/g,'').trim();
          setSummary({...s, content:cleaned});
        } else {
          setSummary(null);
        }
        setSummaryLoading(false);
      } else {
        setSummary(null);
        setSummaryLoading(false);
      }

      // Build insights query — filter by article_date for accuracy
      let query = sb.from('insights').select('*').order('relevance_score',{ascending:false}).limit(200);
      if(activePeriod && PERIOD_RANGES[activePeriod]) {
        const [from,to] = PERIOD_RANGES[activePeriod];
        query = query.gte('article_date',from.split('T')[0]).lt('article_date',to.split('T')[0]);
      } else {
        // YTD — all 2026
        query = query.gte('article_date','2026-01-01').lt('article_date','2027-01-01');
      }

      const {data:ins} = await query;
      setInsights(ins||[]);

      // Load source articles
      if(ins&&ins.length>0) {
        const ids = ins.map(i=>i.id);
        const {data:links} = await sb.from('insight_articles').select('insight_id,article_id').in('insight_id',ids);
        if(links&&links.length>0) {
          const artIds = [...new Set(links.map(l=>l.article_id))];
          const {data:arts} = await sb.from('articles').select('id,title,url,source_name,source_tier,published_at,paywall').in('id',artIds);
          if(arts) {
            const map = {};
            links.forEach(l=>{
              if(!map[l.insight_id])map[l.insight_id]=[];
              const art = arts.find(a=>a.id===l.article_id);
              if(art) map[l.insight_id].push({
                name:cleanSourceName(art.source_name), url:art.url, tier:art.source_tier||2,
                date:art.published_at?new Date(art.published_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'',
                paywall:art.paywall||false
              });
            });
            setArticleMap(map);
          }
        }
      }

      setLoading(false);
    }
    load();
  },[activePeriod]);

  // Filter insights
  const filtered = insights.filter(i=>{
    if(companies.length>0 && !companies.includes(i.competitor)) return false;
    if(markets.length>0 && i.markets) {
      const enabledMktLabels = markets.flatMap(mid=>{
        const m = MARKETS.find(x=>x.id===mid);
        return m&&m.markets?m.markets:[m?m.label:""];
      });
      if(!i.markets.some(m=>enabledMktLabels.includes(m))) return false;
    }
    if(search) {
      const q=search.toLowerCase();
      if(!i.headline.toLowerCase().includes(q)&&!i.synthesis.toLowerCase().includes(q)) return false;
    }
    return true;
  }).sort((a,b)=>sortBy==="latest"
    ? new Date(b.article_date||b.period_end||0)-new Date(a.article_date||a.period_end||0)
    : (b.relevance_score||0)-(a.relevance_score||0)
  );

  const periodLabel = activeMonth||activeQuarter||"2026 Snapshot — Year to Date";
  const isYTD = !activePeriod;

  return React.createElement('div',{style:{maxWidth:720,margin:"0 auto"}},

    // Dark page header with search
    React.createElement('div',{style:{background:C.dark,borderRadius:"10px 10px 0 0",padding:"16px 20px 0"}},
      React.createElement('div',{style:{marginBottom:16}},
        React.createElement('div',{style:{fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:"0.1em",fontFamily:"'DM Mono',monospace",marginBottom:3}},"Strategic Intelligence"),
        React.createElement('div',{style:{fontSize:22,fontWeight:700,color:"#f8fafc",letterSpacing:"-0.02em",fontFamily:"'DM Sans',sans-serif"}},
          "Snapshot ",React.createElement('span',{style:{color:"#3b82f6"}},"'26")
        ),
        React.createElement('div',{style:{fontSize:13,color:"#94a3b8",fontFamily:"'DM Sans',sans-serif",marginTop:6,lineHeight:1.5}},
          "Deep-dive into any month or quarter — curated insights and executive summaries across the full 2026 year to date."
        )
      ),
      React.createElement('div',{style:{display:"flex",alignItems:"center",gap:8,background:"#1e293b",border:"0.5px solid #334155",borderRadius:10,padding:"10px 14px",marginBottom:16}},
        React.createElement('span',{style:{fontSize:15,color:"#64748b"}},"🔍"),
        React.createElement('input',{type:"text",value:search,onChange:e=>setSearch(e.target.value),placeholder:"Search insights...",
          style:{flex:1,border:"none",background:"none",fontSize:14,fontFamily:"'DM Sans',sans-serif",color:"#f8fafc",outline:"none"}})
      ),

      // Quarter tabs — mobile friendly, single line
      React.createElement('div',{style:{display:"flex",gap:3,overflowX:"auto",scrollbarWidth:"none"}},
        QUARTERS.map(q=>{
          const hasData = ALL_MONTHS.some(m=>m.quarter===q.key);
          const isActive = activeQuarter===q.key;
          const insightCount = q.key==="Q1 2026"?111:q.key==="Q2 2026"?58:0;
          // Q3 is in progress since we're in Q2 2026
          const isInProgress = q.key==="Q3 2026";
          const statusLabel = insightCount?insightCount+" insights":isInProgress?"In progress":"Not started";
          return React.createElement('div',{key:q.key,
            onClick:()=>hasData&&handleQuarterClick(q.key),
            style:{
              padding:"10px 16px",borderRadius:"8px 8px 0 0",flexShrink:0,
              background:isActive?"#f59e0b":hasData?"#1e293b":"#0f172a",
              cursor:hasData?"pointer":"not-allowed",
              opacity:hasData?1:0.35,
              display:"flex",flexDirection:"column",alignItems:"center",gap:2
            }},
            React.createElement('div',{style:{fontSize:15,fontWeight:800,color:isActive?"#1c1917":hasData?"#94a3b8":"#64748b",fontFamily:"'DM Sans',sans-serif",whiteSpace:"nowrap"}},q.label),
            React.createElement('div',{style:{fontSize:9,fontWeight:600,color:isActive?"#92400e":"#475569",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:"0.04em",whiteSpace:"nowrap"}},statusLabel)
          );
        })
      )
    ),

    // Month grid — 3 columns, one row per quarter, no horizontal scroll
    React.createElement('div',{style:{background:activeQuarter?"#fffbeb":C.faint,borderLeft:"0.5px solid "+C.border,borderRight:"0.5px solid "+C.border,borderBottom:"2px solid "+(activeQuarter?"#f59e0b":C.border),padding:"10px 16px"}},
      React.createElement('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4}},
        ALL_MONTHS.map(m=>{
          const enabled = enabledMonths.some(em=>em.key===m.key);
          const active = activeMonth===m.key;
          return React.createElement('button',{key:m.key,
            onClick:()=>enabled&&handleMonthClick(m.key),
            style:{
              padding:"8px 4px",border:"none",fontSize:14,fontWeight:active?700:600,
              cursor:enabled?"pointer":"not-allowed",fontFamily:"'DM Sans',sans-serif",
              background:active?(activeQuarter?"#f59e0b":"#1d4ed8"):"transparent",
              color:active?"#fff":enabled?(activeQuarter?"#78350f":C.muted):"#cbd5e1",
              opacity:enabled?1:0.35,
              borderRadius:8,
              transition:"all 0.15s",
              textAlign:"center"
            }},m.label
          );
        })
      )
    ),

    // White body
    React.createElement('div',{style:{background:C.surface,borderRadius:"0 0 10px 10px",padding:"20px 24px",border:"0.5px solid "+C.border,borderTop:"none"}},

      // Exec summary — only when period selected, Design D
      !isYTD && React.createElement(ExecBox,{
        label:(activeMonth?"Monthly":"Quarterly")+" Summary · "+activePeriod,
        content:summary?summary.content:null,
        loading:summaryLoading
      }),

      // Market + company filters
      React.createElement(PillFilter,{label:"Market — select multiple",options:MARKETS,multi:true,multiValues:markets,onMultiToggle:m=>{toggleMarket(m);setPage(1);}}),
      React.createElement(PillFilter,{label:"Company — select multiple",options:COMPANIES,multi:true,multiValues:companies,onMultiToggle:c=>{toggleCompany(c);setPage(1);}}),

      (markets.length>0||companies.length>0) && React.createElement('button',{
        onClick:()=>{setMarkets([]);setCompanies([]);setPage(1);},
        style:{fontSize:12,fontWeight:600,color:"#dc2626",background:"none",border:"none",cursor:"pointer",fontFamily:"'DM Mono',monospace",marginBottom:10,padding:0}
      },"✕ Clear filters"),

      // Sort toggle — below filters
      React.createElement('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
        React.createElement('div',{style:{fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em",fontFamily:"'DM Mono',monospace"}},"Sort"),
        React.createElement('div',{style:{display:"inline-flex",borderRadius:20,overflow:"hidden",border:"0.5px solid "+C.border}},
          React.createElement('button',{onClick:()=>{setSortBy("latest");setPage(1);},style:{padding:"6px 16px",border:"none",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",background:sortBy==="latest"?C.dark:C.surface,color:sortBy==="latest"?"#f8fafc":C.muted,transition:"all 0.15s"}},"Latest first"),
          React.createElement('button',{onClick:()=>{setSortBy("relevant");setPage(1);},style:{padding:"6px 16px",border:"none",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",background:sortBy==="relevant"?C.dark:C.surface,color:sortBy==="relevant"?"#f8fafc":C.muted,borderLeft:"0.5px solid "+C.border,transition:"all 0.15s"}},"Most relevant")
        )
      ),

      React.createElement('p',{style:{fontSize:12,color:C.muted,fontFamily:"'DM Mono',monospace",margin:"0 0 14px",fontStyle:"italic"}},
        "📄 number = sources covering this story"
      ),

      React.createElement('p',{style:{fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em",fontFamily:"'DM Mono',monospace",marginBottom:12}},
        loading?"Loading...":filtered.length+" insight"+(filtered.length!==1?"s":"")+" · "+periodLabel
      ),

      loading
        ? React.createElement('div',{className:"loading"},"Loading snapshot...")
        : filtered.length===0
          ? React.createElement('div',{style:{background:C.faint,borderRadius:10,padding:24,textAlign:"center"}},
              React.createElement('p',{style:{fontSize:15,color:C.muted,fontFamily:"'DM Sans',sans-serif"}},
                search?"No results for \""+search+"\".":"No insights match your filters for this period."
              ))
          : React.createElement('div',null,
              React.createElement('div',{style:{display:"flex",flexDirection:"column",gap:8}},
                filtered.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE).map(insight=>React.createElement(InsightCard,{
                  key:insight.id,
                  insight:{...insight,sources:articleMap[insight.id]||[]},
                  expanded:expanded===insight.id,
                  onExpand:()=>setExpanded(expanded===insight.id?null:insight.id)
                }))
              ),
              filtered.length>PAGE_SIZE && React.createElement(Pagination,{
                page,totalPages:Math.ceil(filtered.length/PAGE_SIZE),
                onChange:p=>{setPage(p);setExpanded(null);window.scrollTo(0,0);}
              })
            )
    )
  );
}

function BookmarksTab({bookmarks,onBookmark}) {
  const [insights,setInsights] = useState([]);
  const [loading,setLoading] = useState(true);
  const [expanded,setExpanded] = useState(null);

  useEffect(()=>{
    if(bookmarks.length===0){setInsights([]);setLoading(false);return;}
    sb.from('insights').select('*').in('id',bookmarks).then(({data})=>{
      setInsights(data||[]);
      setLoading(false);
    });
  },[bookmarks]);

  const tagFreq = {};
  insights.forEach(i=>{if(i.competitor){tagFreq[i.competitor]=(tagFreq[i.competitor]||0)+1;}});
  const total = Object.values(tagFreq).reduce((a,b)=>a+b,0)||1;

  const summaryText = insights.length>0
    ? "Based on "+insights.length+" saved article"+(insights.length!==1?"s":"")+", you are tracking: "+Object.entries(tagFreq).map(([k,v])=>k+" ("+Math.round(v/total*100)+"%)").join(", ")+"."
    : null;

  return React.createElement('div',{style:{maxWidth:720,margin:"0 auto"}},
    React.createElement(PageHeader,{
      supLabel:"Your Library",
      title:"Bookmarks",
      description:"Your saved stories — insights you've flagged for follow-up, reference, or sharing.",
      subtitle:insights.length>0?insights.length+" saved insight"+(insights.length!==1?"s":""):"No bookmarks yet"
    }),
    React.createElement('div',{style:{background:C.surface,borderRadius:"0 0 10px 10px",padding:"20px 24px",border:"0.5px solid "+C.border,borderTop:"none"}},
      insights.length>0 && React.createElement(ExecBox,{
        label:"What your saves say",
        content:summaryText
      }),
      loading
        ?React.createElement('div',{className:"loading"},"Loading bookmarks...")
        :insights.length===0
          ?React.createElement('div',{style:{background:C.faint,borderRadius:10,padding:"28px 20px",textAlign:"center"}},
              React.createElement('div',{style:{fontSize:32,marginBottom:12}},"★"),
              React.createElement('p',{style:{fontSize:16,fontWeight:600,color:C.dark,fontFamily:"'DM Sans',sans-serif",marginBottom:6}},"No bookmarks yet"),
              React.createElement('p',{style:{fontSize:14,color:C.muted,fontFamily:"'DM Sans',sans-serif"}},"Tap the ☆ star on any story in Latest or Snapshot to save it here.")
            )
          :React.createElement('div',{style:{display:"flex",flexDirection:"column",gap:8}},
              insights.map(insight=>React.createElement(InsightCard,{
                key:insight.id,insight,
                saved:true,onBookmark,
                expanded:expanded===insight.id,
                onExpand:()=>setExpanded(expanded===insight.id?null:insight.id)
              }))
            )
    )
  );
}

      style:{background:C.surface,borderRadius:"16px 16px 0 0",padding:"24px 20px 40px",width:"100%",maxHeight:"85vh",overflowY:"auto"},
      onClick:e=>e.stopPropagation()
    },
      // Handle bar
      React.createElement('div',{style:{width:36,height:4,background:C.border,borderRadius:2,margin:"0 auto 20px"}}),

      // Header
      React.createElement('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}},
        React.createElement('div',null,
          React.createElement('div',{style:{fontSize:18,fontWeight:700,color:C.dark,fontFamily:"'DM Sans',sans-serif"}},
            "About MENAintel"
          ),
          React.createElement('div',{style:{fontSize:12,color:C.muted,fontFamily:"'DM Mono',monospace",marginTop:2}},"v1 · May 2026")
        ),
        React.createElement('button',{onClick:onClose,style:{background:"none",border:"none",fontSize:20,color:C.muted,cursor:"pointer",padding:"4px 8px"}},"✕")
      ),

      // Sections
      sections.map((s,i)=>React.createElement('div',{key:i,style:{marginBottom:18,paddingBottom:18,borderBottom:i<sections.length-1?"0.5px solid "+C.faint:"none"}},
        React.createElement('div',{style:{fontSize:13,fontWeight:700,color:C.dark,fontFamily:"'DM Sans',sans-serif",marginBottom:6}},s.title),
        React.createElement('p',{style:{fontSize:14,color:"#334155",lineHeight:1.7,margin:0,fontFamily:"'Georgia',serif"}},s.body)
      )),

      // Footer
      React.createElement('div',{style:{marginTop:20,paddingTop:16,borderTop:"0.5px solid "+C.faint}},
        React.createElement('p',{style:{fontSize:11,color:C.subtle,fontFamily:"'DM Mono',monospace",margin:0,textAlign:"center"}},
          "Powered by Claude AI · Data from 68 sources · Updates 3× daily"
        )
      )
    )
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [activeTab,setActiveTab] = useState("today");
  const [bookmarks,setBookmarks] = useState([]);
  const [showAbout,setShowAbout] = useState(false);

  const toggleBookmark = id=>setBookmarks(prev=>prev.includes(id)?prev.filter(b=>b!==id):[...prev,id]);

  const tabs = [
    {id:"today",label:"Latest"},
    {id:"snapshot",label:"Snapshot"},
    {id:"benchmarks",label:"Market Data"},
    {id:"saved",label:"Bookmarks"+(bookmarks.length>0?" ("+bookmarks.length+")":"")},
  ];

  return React.createElement('div',{style:{minHeight:"100vh",background:C.bg,fontFamily:"'DM Sans',sans-serif"}},
    // C2 Nav — slate blue #243447
    React.createElement('div',{style:{position:"sticky",top:0,zIndex:10,background:"#243447",boxShadow:"0 2px 8px rgba(0,0,0,0.2)"}},
      React.createElement('div',{style:{padding:"14px 20px 0",display:"flex",alignItems:"center",justifyContent:"space-between"}},
        React.createElement('span',{style:{fontSize:18,fontWeight:800,color:"#f8fafc",fontFamily:"'DM Sans',sans-serif",letterSpacing:"-0.03em"}},
          "MENA",React.createElement('span',{style:{color:"#38bdf8"}},"intel")
        ),
        React.createElement('div',{style:{display:"flex",alignItems:"center",gap:12}},
          React.createElement('span',{style:{fontSize:14,fontWeight:600,color:"#cbd5e1",fontFamily:"'DM Mono',monospace",letterSpacing:"0.04em"}},
            new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})
          ),
          React.createElement('button',{
            onClick:()=>setShowAbout(true),
            style:{background:"rgba(255,255,255,0.1)",border:"none",borderRadius:"50%",width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#cbd5e1",fontSize:14,fontWeight:700,fontFamily:"'DM Sans',sans-serif"}
          },"ⓘ")
        )
      ),
      React.createElement('div',{style:{display:"flex",overflowX:"auto",padding:"0 20px",gap:0,scrollbarWidth:"none"}},
        tabs.map(tab=>React.createElement('button',{key:tab.id,onClick:()=>setActiveTab(tab.id),style:{
          padding:"12px 16px",border:"none",background:"none",
          fontSize:15,fontWeight:activeTab===tab.id?700:600,
          color:activeTab===tab.id?"#f8fafc":"#64748b",
          cursor:"pointer",fontFamily:"'DM Sans',sans-serif",whiteSpace:"nowrap",
          borderBottom:activeTab===tab.id?"3px solid #38bdf8":"3px solid transparent",
          transition:"all 0.15s"
        }},tab.label))
      )
    ),
    React.createElement('div',{style:{padding:"0 0 60px"}},
      activeTab==="today"&&React.createElement(LatestTab,{bookmarks,onBookmark:toggleBookmark}),
      activeTab==="snapshot"&&React.createElement(SnapshotTab,null),
      activeTab==="benchmarks"&&React.createElement(MarketDataTab,null),
      activeTab==="saved"&&React.createElement(BookmarksTab,{bookmarks,onBookmark:toggleBookmark})
    ),
    showAbout && React.createElement(AboutModal,{onClose:()=>setShowAbout(false)})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
