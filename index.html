<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MENAintel</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script src="data.js"></script>
  <style>* { box-sizing: border-box; margin: 0; padding: 0; } body { background: #f8fafc; }</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState } = React;

const TierBadge = ({tier}) => (
  React.createElement('span', {style:{fontSize:10,fontWeight:700,letterSpacing:"0.06em",padding:"2px 6px",borderRadius:4,background:tier===1?"#dcfce7":"#fef9c3",color:tier===1?C.green:C.amber,textTransform:"uppercase"}}, "T"+tier)
);

const SourceChip = ({source}) => (
  React.createElement('a', {href:source.url,target:"_blank",rel:"noopener noreferrer",
    style:{display:"inline-flex",alignItems:"center",gap:6,padding:"4px 10px",borderRadius:20,border:"1px solid "+C.border,background:C.faint,fontSize:12,color:"#334155",textDecoration:"none",fontFamily:"'DM Mono',monospace",cursor:"pointer"},
    onMouseEnter:e=>{e.currentTarget.style.background=C.dark;e.currentTarget.style.color="#f8fafc";e.currentTarget.style.borderColor=C.dark;},
    onMouseLeave:e=>{e.currentTarget.style.background=C.faint;e.currentTarget.style.color="#334155";e.currentTarget.style.borderColor=C.border;}},
    React.createElement(TierBadge,{tier:source.tier}),
    source.paywall ? " 🔒 " : " ",
    source.name, " ",
    React.createElement('span',{style:{opacity:0.45}},source.date), " ",
    React.createElement('span',{style:{fontSize:10,opacity:0.4}},"↗")
  )
);

const CategoryTag = ({category,color}) => (
  React.createElement('span',{style:{fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color,borderLeft:"3px solid "+color,paddingLeft:8}},category)
);

const ExecSummary = ({competitor, filteredInsights}) => {
  const corroborated = filteredInsights.filter(i=>i.corroborated).length;
  const total = filteredInsights.length;
  const stats = competitor === "All"
    ? [{label:"Stories",value:"21"},{label:"Corroborated",value:"8 / 21"},{label:"Talabat Q1 GMV",value:"$2.7B"},{label:"Markets",value:"UAE · KSA · EGY · TR · ZA"}]
    : [{label:"Stories",value:String(total)},{label:"Corroborated",value:corroborated+" / "+total},{label:"Viewing",value:competitor}];

  const summaryText = competitor === "All"
    ? "Talabat dominates the week across two fronts: Q1 2026 results (12 May) beat guidance with GMV up 18% to $2.7B and raised full-year net income guidance to $300-330M, while its Cairo hub — MENA's largest at 27,000 sqm — became operational 28 April, processing up to 1 million items daily across 12 Egyptian cities. Three IPO stories converge: Noon confirmed its dual UAE-Saudi listing within 24 months at ~$10B valuation; Ninja is lining up Goldman Sachs and Citi for a $1B Tadawul debut; Careem is approaching IPO-readiness after its first profitable year."
    : competitor + " appears in " + total + " stor" + (total!==1?"ies":"y") + " this week" + (corroborated>0?", of which "+corroborated+" "+(corroborated===1?"is":"are")+" fully corroborated":"")+". "+filteredInsights.slice(0,2).map(i=>i.headline).join(". ");

  return React.createElement('div',{style:{background:"linear-gradient(135deg,"+C.dark+" 0%,"+C.darkMid+" 100%)",borderRadius:14,padding:"24px 28px",marginBottom:24}},
    React.createElement('p',{style:{fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",color:"#475569",fontFamily:"'DM Mono',monospace",margin:"0 0 14px"}},
      (competitor==="All"?"Executive Summary":"Summary · "+competitor)+" · 9–16 May 2026"),
    React.createElement('p',{style:{fontSize:15,lineHeight:1.85,margin:"0 0 14px",fontFamily:"'Georgia',serif",color:"#cbd5e1"}},summaryText),
    competitor==="All" && React.createElement('p',{style:{fontSize:14,lineHeight:1.8,margin:0,fontFamily:"'Georgia',serif",color:"#64748b",fontStyle:"italic"}},
      "⚠ Monitoring: Alshaya Group's regulatory push against Shein/Temu — watch for GCC government response in H2 2026."),
    React.createElement('div',{style:{display:"flex",flexWrap:"wrap",gap:24,marginTop:20,paddingTop:16,borderTop:"1px solid rgba(255,255,255,0.07)"}},
      stats.map(s=>React.createElement('div',{key:s.label},
        React.createElement('div',{style:{fontSize:18,fontWeight:700,color:"#f8fafc",fontFamily:"'DM Sans',sans-serif"}},s.value),
        React.createElement('div',{style:{fontSize:10,color:"#475569",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:"0.06em",marginTop:2}},s.label)
      ))
    )
  );
};

function TodayTab({tags,bookmarks,onBookmark,competitor,setCompetitor,setActiveTab}) {
  const [expanded,setExpanded] = useState(null);
  const [showAll,setShowAll] = useState(false);
  const [sortBy,setSortBy] = useState("latest");
  const activeTags = tags.filter(t=>t.active).map(t=>t.label);
  const filteredInsights = INSIGHTS
    .filter(i=>competitor==="All"||i.competitor===competitor)
    .sort((a,b)=>sortBy==="latest"?(b.id-a.id):(b.relevanceScore-a.relevanceScore));

  return React.createElement('div',{style:{maxWidth:720,margin:"0 auto"}},
    React.createElement('div',{style:{marginBottom:28}},
      React.createElement('p',{style:{fontSize:11,letterSpacing:"0.12em",textTransform:"uppercase",color:C.subtle,fontFamily:"'DM Mono',monospace",margin:"0 0 6px"}},"MENA E-Commerce Intelligence · 9–16 May 2026"),
      React.createElement('h1',{style:{fontSize:26,fontWeight:700,color:C.dark,margin:"0 0 16px",fontFamily:"'DM Sans',sans-serif"}},"Last 7 Days"),

      // Company filter
      React.createElement('div',{style:{marginBottom:16}},
        React.createElement('span',{style:{fontSize:10,color:C.subtle,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:8}},"Filter by company"),
        React.createElement('div',{style:{display:"flex",flexWrap:"wrap",gap:6}},
          COMPETITORS.map(c=>React.createElement('button',{key:c,onClick:()=>setCompetitor(c),style:{padding:"4px 12px",borderRadius:20,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'DM Mono',monospace",border:competitor===c?"none":"1px solid "+C.border,background:competitor===c?C.dark:C.surface,color:competitor===c?"#f8fafc":C.muted}},c))
        )
      ),

      // Sort + Priority toggle row
      React.createElement('div',{style:{display:"flex",alignItems:"center",gap:10,marginBottom:16,flexWrap:"wrap"}},
        // Sort toggle
        React.createElement('div',{style:{display:"inline-flex",borderRadius:8,overflow:"hidden",border:"1px solid "+C.border}},
          React.createElement('button',{onClick:()=>setSortBy("latest"),style:{padding:"6px 14px",border:"none",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",background:sortBy==="latest"?C.dark:C.surface,color:sortBy==="latest"?"#f8fafc":C.muted}},"Latest first"),
          React.createElement('button',{onClick:()=>setSortBy("relevant"),style:{padding:"6px 14px",border:"none",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",background:sortBy==="relevant"?"#1d4ed8":C.surface,color:sortBy==="relevant"?"#f8fafc":C.muted,borderLeft:"1px solid "+C.border}},"Most relevant")
        ),
        // Priority/All toggle
        React.createElement('div',{style:{display:"inline-flex",borderRadius:8,overflow:"hidden",border:"1px solid "+C.border}},
          React.createElement('button',{onClick:()=>setShowAll(false),style:{padding:"6px 14px",border:"none",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",background:!showAll?"#1d4ed8":C.surface,color:!showAll?"#f8fafc":C.muted}},"Priority"),
          React.createElement('button',{onClick:()=>setShowAll(true),style:{padding:"6px 14px",border:"none",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",background:showAll?C.dark:C.surface,color:showAll?"#f8fafc":C.muted,borderLeft:"1px solid "+C.border}},"All news")
        )
      ),

      // Focus areas panel
      !showAll && activeTags.length>0 && React.createElement('div',{style:{padding:"12px 14px",borderRadius:10,background:"#eff6ff",border:"1px solid #bfdbfe",marginBottom:16}},
        React.createElement('div',{style:{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:8}},
          React.createElement('span',{style:{fontSize:10,color:"#1d4ed8",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:"0.08em"}},"Your focus areas:"),
          activeTags.map(t=>React.createElement('span',{key:t,style:{fontSize:11,padding:"3px 10px",borderRadius:20,background:"#fff",color:"#1d4ed8",border:"1px solid #bfdbfe",fontFamily:"'DM Mono',monospace"}},t))
        ),
        React.createElement('p',{style:{fontSize:11,color:"#3b82f6",fontFamily:"'Georgia',serif",fontStyle:"italic",margin:0,lineHeight:1.6}},
          "Stories ranked by your focus areas, boosted by saves. Everything corroborated appears — focus areas determine order. ",
          React.createElement('span',{style:{color:"#1d4ed8",cursor:"pointer",textDecoration:"underline",fontStyle:"normal",fontFamily:"'DM Mono',monospace",fontSize:10},onClick:()=>setActiveTab("settings")},"Edit →")
        )
      ),

      React.createElement(ExecSummary,{competitor,filteredInsights})
    ),
    React.createElement('p',{style:{fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",color:C.subtle,fontFamily:"'DM Mono',monospace",marginBottom:12}},
      sortBy==="latest"?"Latest stories":"Insights — ranked by relevance",
      competitor!=="All" && React.createElement('span',{style:{color:C.dark,fontWeight:700}}," · "+competitor)
    ),
    filteredInsights.length===0
      ? React.createElement('div',{style:{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:28,textAlign:"center"}},
          React.createElement('p',{style:{fontSize:14,color:C.muted,fontFamily:"'DM Sans',sans-serif"}},"No stories for "+competitor+" in the last 7 days."))
      : React.createElement('div',{style:{display:"flex",flexDirection:"column",gap:10}},
          filteredInsights.map(insight=>{
            const saved=bookmarks.includes(insight.id);
            return React.createElement('div',{key:insight.id,style:{border:"1px solid "+C.border,borderRadius:12,overflow:"hidden",background:C.surface,boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}},
              React.createElement('div',{style:{padding:"14px 18px",borderLeft:"4px solid "+insight.categoryColor,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",gap:12},onClick:()=>setExpanded(expanded===insight.id?null:insight.id)},
                React.createElement('div',{style:{flex:1}},
                  React.createElement('div',{style:{display:"flex",alignItems:"center",gap:10,marginBottom:6}},
                    React.createElement(CategoryTag,{category:insight.category,color:insight.categoryColor}),
                    React.createElement('span',{style:{fontSize:10,fontFamily:"'DM Mono',monospace",color:C.subtle}},insight.relevanceScore+"% match"),
                    insight.competitor && React.createElement('span',{style:{fontSize:10,padding:"1px 7px",borderRadius:10,background:C.faint,color:C.muted,border:"1px solid "+C.border,fontFamily:"'DM Mono',monospace"}},insight.competitor)
                  ),
                  React.createElement('p',{style:{margin:0,fontSize:14,fontWeight:600,color:C.dark,fontFamily:"'DM Sans',sans-serif",lineHeight:1.4}},insight.headline)
                ),
                React.createElement('div',{style:{display:"flex",alignItems:"center",gap:8,flexShrink:0}},
                  !insight.corroborated && React.createElement('span',{style:{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:20,background:"#fff7ed",color:C.orange,border:"1px solid #fed7aa"}},"!"),
                  React.createElement('button',{onClick:e=>{e.stopPropagation();onBookmark(insight.id);},style:{background:"none",border:"none",cursor:"pointer",fontSize:16,color:saved?"#f59e0b":C.border,padding:2}},saved?"★":"☆"),
                  React.createElement('span',{style:{color:C.border,fontSize:16,display:"inline-block",transform:expanded===insight.id?"rotate(180deg)":"none",transition:"transform 0.2s"}},"⌄")
                )
              ),
              expanded===insight.id && React.createElement('div',{style:{padding:"16px 18px 18px",borderTop:"1px solid "+C.faint,background:"#fafafa"}},
                React.createElement('p',{style:{fontSize:14,lineHeight:1.8,color:"#334155",margin:"0 0 14px",fontFamily:"'Georgia',serif"}},insight.synthesis),
                React.createElement('div',{style:{display:"flex",flexWrap:"wrap",gap:6}},
                  insight.sources.map((s,i)=>React.createElement(SourceChip,{key:i,source:s}))
                )
              )
            );
          })
        )
  );
}

function TrendsTab({competitor,setCompetitor}) {
  const [horizon,setHorizon] = useState("monthly");
  const [market,setMarket] = useState("all");

  // Dynamic period labels based on current date context (May 2026)
  const periods = [
    {key:"monthly",label:"May 2026",sub:"This month"},
    {key:"monthly_prev",label:"April 2026",sub:"Last month"},
    {key:"quarterly",label:"Q2 2026 (Apr–Jun)",sub:"This quarter"},
    {key:"quarterly_prev",label:"Q1 2026 (Jan–Mar)",sub:"Last quarter"},
  ];

  // Map period keys to TRENDS data keys
  const dataKey = horizon==="monthly"||horizon==="monthly_prev" ? "monthly" : "quarterly";
  const data = TRENDS[dataKey];

  const filteredInsights = data.insights.filter(ins=>{
    const mObj = MARKETS_LIST.find(m=>m.id===market);
    const marketOk = market==="all"||(mObj&&mObj.markets?ins.markets.some(m=>mObj.markets.includes(m)):true);
    const compOk = competitor==="All"||ins.competitor===competitor;
    return marketOk&&compOk;
  });

  const activePeriod = periods.find(p=>p.key===horizon)||periods[0];

  return React.createElement('div',{style:{maxWidth:720,margin:"0 auto"}},
    React.createElement('div',{style:{marginBottom:20}},
      React.createElement('p',{style:{fontSize:11,color:C.subtle,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 0 4px"}},"Strategic Intelligence"),
      React.createElement('h2',{style:{fontSize:22,fontWeight:700,color:C.dark,margin:"0 0 6px",fontFamily:"'DM Sans',sans-serif"}},"Snapshot"),
      React.createElement('div',{style:{display:"flex",alignItems:"center",gap:6}},
        React.createElement('span',{style:{fontSize:12,color:C.subtle,fontFamily:"'DM Mono',monospace"}},"⏱ "+data.readMins+" min read"),
        React.createElement('span',{style:{color:C.border}}," · "),
        React.createElement('span',{style:{fontSize:12,color:C.subtle,fontFamily:"'DM Mono',monospace"}},data.storiesAnalysed+" stories analysed")
      )
    ),

    // Filter bar — normalised to pill style matching Feed
    React.createElement('div',{style:{marginBottom:20}},

      // Period filter
      React.createElement('div',{style:{marginBottom:14}},
        React.createElement('span',{style:{fontSize:10,color:C.subtle,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:8}},"Time period"),
        React.createElement('div',{style:{display:"flex",flexWrap:"wrap",gap:6}},
          periods.map(p=>React.createElement('button',{key:p.key,onClick:()=>setHorizon(p.key),style:{
            padding:"4px 14px",borderRadius:20,fontSize:12,fontWeight:600,cursor:"pointer",
            fontFamily:"'DM Mono',monospace",border:horizon===p.key?"none":"1px solid "+C.border,
            background:horizon===p.key?C.dark:C.surface,color:horizon===p.key?"#f8fafc":C.muted}},
            p.label
          ))
        )
      ),

      // Market filter
      React.createElement('div',{style:{marginBottom:14}},
        React.createElement('span',{style:{fontSize:10,color:C.subtle,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:8}},"Market"),
        React.createElement('div',{style:{display:"flex",flexWrap:"wrap",gap:6}},
          MARKETS_LIST.map(m=>React.createElement('button',{key:m.id,onClick:()=>setMarket(m.id),style:{
            padding:"4px 14px",borderRadius:20,fontSize:12,fontWeight:600,cursor:"pointer",
            fontFamily:"'DM Mono',monospace",border:market===m.id?"none":"1px solid "+C.border,
            background:market===m.id?C.dark:C.surface,color:market===m.id?"#f8fafc":C.muted}},
            m.label
          ))
        )
      ),

      // Company filter
      React.createElement('div',null,
        React.createElement('span',{style:{fontSize:10,color:C.subtle,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:8}},"Filter by company"),
        React.createElement('div',{style:{display:"flex",flexWrap:"wrap",gap:6}},
          COMPETITORS.map(c=>React.createElement('button',{key:c,onClick:()=>setCompetitor(c),style:{
            padding:"4px 12px",borderRadius:20,fontSize:12,fontWeight:600,cursor:"pointer",
            fontFamily:"'DM Mono',monospace",border:competitor===c?"none":"1px solid "+C.border,
            background:competitor===c?C.dark:C.surface,color:competitor===c?"#f8fafc":C.muted}},c))
        )
      )
    ),

    // Summary block
    React.createElement('div',{style:{background:"linear-gradient(135deg,"+C.dark+" 0%,"+C.darkMid+" 100%)",borderRadius:14,padding:"22px 26px",marginBottom:28}},
      React.createElement('p',{style:{fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",color:"#475569",fontFamily:"'DM Mono',monospace",margin:"0 0 12px"}},activePeriod.label+" Summary"),
      React.createElement('p',{style:{fontSize:15,lineHeight:1.85,margin:0,fontFamily:"'Georgia',serif",color:"#cbd5e1"}},data.summary)
    ),

    filteredInsights.length===0
      ? React.createElement('div',{style:{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:28,textAlign:"center"}},React.createElement('p',{style:{fontSize:14,color:C.muted,fontFamily:"'DM Sans',sans-serif"}},"No insights match your current filters. Try broadening the selection."))
      : React.createElement('div',{style:{display:"flex",flexDirection:"column",gap:24}},
          filteredInsights.map(insight=>React.createElement('div',{key:insight.id,style:{border:"1px solid "+C.border,borderRadius:14,overflow:"hidden",background:C.surface,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}},
            React.createElement('div',{style:{padding:"18px 22px 16px",borderLeft:"5px solid "+insight.categoryColor,borderBottom:"1px solid "+C.faint}},
              React.createElement('div',{style:{display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap"}},
                React.createElement(CategoryTag,{category:insight.category,color:insight.categoryColor}),
                insight.markets.map(m=>React.createElement('span',{key:m,style:{fontSize:10,padding:"1px 6px",borderRadius:4,background:"#f0fdf4",color:"#15803d",border:"1px solid #bbf7d0",fontFamily:"'DM Mono',monospace"}},m)),
                !insight.corroborated && React.createElement('span',{style:{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20,background:"#fff7ed",color:C.orange,border:"1px solid #fed7aa"}},"⚠ Single source")
              ),
              React.createElement('h3',{style:{margin:0,fontSize:17,fontWeight:700,color:C.dark,fontFamily:"'DM Sans',sans-serif",lineHeight:1.35}},insight.headline)
            ),
            React.createElement('div',{style:{padding:"0 22px 22px"}},
              insight.sections.map((sec,si)=>React.createElement('div',{key:si,style:{marginTop:22}},
                React.createElement('p',{style:{fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:insight.categoryColor,fontFamily:"'DM Mono',monospace",margin:"0 0 8px"}},sec.theme),
                React.createElement('p',{style:{fontSize:14,lineHeight:1.85,color:"#334155",margin:0,fontFamily:"'Georgia',serif"}},sec.body)
              )),
              React.createElement('div',{style:{marginTop:22,paddingTop:16,borderTop:"1px solid "+C.faint}},
                React.createElement('p',{style:{fontSize:10,color:C.subtle,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 0 8px"}},"Sources"),
                React.createElement('div',{style:{display:"flex",flexWrap:"wrap",gap:6}},
                  insight.sources.map((s,i)=>React.createElement(SourceChip,{key:i,source:s}))
                )
              )
            )
          ))
        )
  );
}

function SavedTab({bookmarks,tags}) {
  const savedInsights = INSIGHTS.filter(i=>bookmarks.includes(i.id));
  const tagFreq = {};
  savedInsights.forEach(i=>{if(i.competitor){tagFreq[i.competitor]=(tagFreq[i.competitor]||0)+1;}});
  const total = Object.values(tagFreq).reduce((a,b)=>a+b,0)||1;

  return React.createElement('div',{style:{maxWidth:720,margin:"0 auto"}},
    React.createElement('div',{style:{marginBottom:24}},
      React.createElement('p',{style:{fontSize:11,color:C.subtle,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 0 4px"}},"Your Library"),
      React.createElement('h2',{style:{fontSize:22,fontWeight:700,color:C.dark,margin:0,fontFamily:"'DM Sans',sans-serif"}},"Bookmarks")
    ),
    savedInsights.length>0 && React.createElement('div',{style:{background:"linear-gradient(135deg,"+C.dark+" 0%,"+C.darkMid+" 100%)",borderRadius:14,padding:"22px 26px",marginBottom:24}},
      React.createElement('p',{style:{fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",color:"#475569",fontFamily:"'DM Mono',monospace",margin:"0 0 12px"}},"What the app has learned from your saves"),
      React.createElement('p',{style:{fontSize:14,lineHeight:1.75,color:"#cbd5e1",fontFamily:"'Georgia',serif",margin:"0 0 18px"}},"Based on "+savedInsights.length+" saved article"+(savedInsights.length!==1?"s":"")+", you are tracking: "+Object.entries(tagFreq).map(([k,v])=>k+" ("+Math.round(v/total*100)+"%)").join(", ")+"."),
      React.createElement('div',{style:{display:"flex",flexDirection:"column",gap:8}},
        Object.entries(tagFreq).map(([tag,count])=>React.createElement('div',{key:tag,style:{display:"flex",alignItems:"center",gap:12}},
          React.createElement('span',{style:{fontSize:11,color:"#94a3b8",fontFamily:"'DM Mono',monospace",width:120,flexShrink:0}},tag),
          React.createElement('div',{style:{flex:1,height:6,background:"rgba(255,255,255,0.08)",borderRadius:3,overflow:"hidden"}},React.createElement('div',{style:{width:(count/total*100)+"%",height:"100%",background:"#3b82f6",borderRadius:3}})),
          React.createElement('span',{style:{fontSize:11,color:"#64748b",fontFamily:"'DM Mono',monospace",width:32,textAlign:"right"}},Math.round(count/total*100)+"%")
        ))
      )
    ),
    savedInsights.length===0
      ? React.createElement('div',{style:{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:28,textAlign:"center"}},React.createElement('p',{style:{fontSize:14,color:C.muted,fontFamily:"'DM Sans',sans-serif"}},"No bookmarks yet. Star stories on the Latest tab to save them here."))
      : React.createElement('div',{style:{display:"flex",flexDirection:"column",gap:8}},

                        {type:'bar',label:'Revenue ($M)',data:cData.map(d=>d.revenue),backgroundColor:'#3b82f6',borderRadius:3,yAxisID:'y',order:2},
                        {type:'line',label:'EBITDA ($M)',data:cData.map(d=>d.ebitda),borderColor:'#f59e0b',backgroundColor:'#f59e0b',borderWidth:2,pointRadius:4,pointBackgroundColor:'#f59e0b',tension:0.3,yAxisID:'y2',order:1}

                React.createElement('div',{style:{width:10,height:10,borderRadius:2,background:"#3b82f6"}}),

            React.createElement('p',{style:{fontSize:10,color:C.subtle,fontFamily:"'DM Mono',monospace",marginTop:10,fontStyle:"italic"}},"Quarterly reporting available for publicly listed companies only.")

    React.createElement('p',{style:{fontSize:10,color:C.subtle,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10}},"Tap for full details"),
    BENCH_COMPANIES.map(co=>
      React.createElement('div',{key:co.name,style:{border:"1px solid "+C.border,borderRadius:12,marginBottom:8,overflow:"hidden",background:C.surface}},
        React.createElement('div',{style:{padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"},onClick:()=>setSelected(selected===co.name?null:co.name)},

  );
}

function App() {
  const [activeTab,setActiveTab] = useState("today");
  const [tags,setTags] = useState(INITIAL_TAGS);
  const [bookmarks,setBookmarks] = useState([]);
  const [todayCompetitor,setTodayCompetitor] = useState("All");
  const [trendsCompetitor,setTrendsCompetitor] = useState("All");
  const toggleBookmark = id=>setBookmarks(prev=>prev.includes(id)?prev.filter(b=>b!==id):[...prev,id]);
  const tabs = [
    {id:"today",label:"Latest"},
    {id:"trends",label:"Snapshot"},
    {id:"benchmarks",label:"Market Data"},
    {id:"saved",label:"Bookmarks"+(bookmarks.length>0?" ("+bookmarks.length+")":"")},
    {id:"settings",label:"Settings"},
  ];

  return React.createElement('div',{style:{minHeight:"100vh",background:C.bg,fontFamily:"'DM Sans',sans-serif"}},

    // ── NAV ──
    React.createElement('div',{style:{position:"sticky",top:0,zIndex:10,background:"#0f172a",boxShadow:"0 2px 12px rgba(0,0,0,0.25)"}},
      // Logo row
      React.createElement('div',{style:{padding:"14px 24px 0",display:"flex",alignItems:"center",justifyContent:"space-between"}},
        React.createElement('span',{style:{fontSize:16,fontWeight:800,color:"#f8fafc",fontFamily:"'DM Sans',sans-serif",letterSpacing:"-0.03em"}},
          "MENA",React.createElement('span',{style:{color:"#3b82f6"}},"intel")
        ),
        React.createElement('span',{style:{fontSize:10,color:"#475569",fontFamily:"'DM Mono',monospace",letterSpacing:"0.06em",textTransform:"uppercase"}},"16 May 2026")
      ),
      // Tab row
      React.createElement('div',{style:{display:"flex",overflowX:"auto",padding:"0 24px",gap:4,scrollbarWidth:"none"}},
        tabs.map(tab=>React.createElement('button',{key:tab.id,onClick:()=>setActiveTab(tab.id),style:{
          padding:"12px 16px",border:"none",background:"none",
          fontSize:14,fontWeight:activeTab===tab.id?700:500,
          color:activeTab===tab.id?"#f8fafc":"#64748b",
          cursor:"pointer",fontFamily:"'DM Sans',sans-serif",whiteSpace:"nowrap",
          borderBottom:activeTab===tab.id?"3px solid #3b82f6":"3px solid transparent",
          transition:"all 0.15s",
        }},tab.label))
      )
    ),

    // ── CONTENT ──
    React.createElement('div',{style:{padding:"32px 24px 60px"}},
      activeTab==="today" && React.createElement(TodayTab,{tags,bookmarks,onBookmark:toggleBookmark,competitor:todayCompetitor,setCompetitor:setTodayCompetitor,setActiveTab}),
      activeTab==="trends" && React.createElement(TrendsTab,{competitor:trendsCompetitor,setCompetitor:setTrendsCompetitor}),
      activeTab==="benchmarks" && React.createElement(BenchmarksTab,null),
      activeTab==="saved" && React.createElement(SavedTab,{bookmarks,tags}),
      activeTab==="settings" && React.createElement(SettingsTab,{tags,setTags})
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
