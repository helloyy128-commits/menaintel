// ─── LATEST TAB ───────────────────────────────────────────────────────────────
function LatestTab({bookmarks,onBookmark}) {
  const [insights,setInsights] = useState([]);
  const [summary,setSummary] = useState(null);
  const [loading,setLoading] = useState(true);
  const [search,setSearch] = useState("");
  const [market,setMarket] = useState("all");
  const [company,setCompany] = useState("All");
  const [sortBy,setSortBy] = useState("latest");
  const [expanded,setExpanded] = useState(null);
  const [articleMap,setArticleMap] = useState({});

  useEffect(()=>{
    async function load() {
      setLoading(true);
      const weekAgo = new Date(Date.now()-14*24*60*60*1000).toISOString();

      // Use period_start to filter — reflects article publish dates not creation date
      const {data:ins} = await sb.from('insights')
        .select('*')
        .gte('period_start', weekAgo)
        .order('relevance_score',{ascending:false})
        .limit(50);

      // Fetch latest daily summary
      const {data:sums} = await sb.from('summaries')
        .select('*')
        .eq('period_type','daily')
        .order('created_at',{ascending:false})
        .limit(1);

      setInsights(ins||[]);
      setSummary(sums&&sums[0]?sums[0]:null);

      // Load source articles for these insights
      if(ins&&ins.length>0) {
        const insightIds = ins.map(i=>i.id);
        const {data:links} = await sb.from('insight_articles')
          .select('insight_id, article_id')
          .in('insight_id', insightIds);
        if(links&&links.length>0) {
          const articleIds = [...new Set(links.map(l=>l.article_id))];
          const {data:arts} = await sb.from('articles')
            .select('id, title, url, source_name, source_tier, published_at, paywall')
            .in('id', articleIds);
          if(arts) {
            const map = {};
            links.forEach(l=>{
              if(!map[l.insight_id]) map[l.insight_id]=[];
              const art = arts.find(a=>a.id===l.article_id);
              if(art) map[l.insight_id].push({
                name: art.source_name,
                url: art.url,
                tier: art.source_tier||2,
                date: art.published_at?new Date(art.published_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'',
                paywall: art.paywall||false
              });
            });
            setArticleMap(map);
          }
        }
      }

      setLoading(false);
    }
    load();
  },[]);

  const mObj = MARKETS.find(m=>m.id===market);
  const filtered = insights
    .filter(i=>{
      if(company!=="All" && i.competitor!==company) return false;
      if(market!=="all" && mObj && mObj.markets && i.markets) {
        if(!i.markets.some(m=>mObj.markets.includes(m))) return false;
      }
      if(search) {
        const q = search.toLowerCase();
        if(!i.headline.toLowerCase().includes(q) && !i.synthesis.toLowerCase().includes(q)) return false;
      }
      return true;
    })
    .sort((a,b)=>sortBy==="latest"
      ? new Date(b.created_at)-new Date(a.created_at)
      : (b.relevance_score||0)-(a.relevance_score||0)
    );

  const corroborated = filtered.filter(i=>i.corroborated).length;

  return React.createElement('div',{style:{maxWidth:720,margin:"0 auto"}},
    // Header
    React.createElement('div',{style:{marginBottom:20}},
      React.createElement('p',{style:{fontSize:11,letterSpacing:"0.12em",textTransform:"uppercase",color:C.subtle,fontFamily:"'DM Mono',monospace",margin:"0 0 4px"}},"MENA E-Commerce Intelligence · Trailing 7 Days"),
      React.createElement('h1',{style:{fontSize:26,fontWeight:700,color:C.dark,fontFamily:"'DM Sans',sans-serif"}})
    ),

    // Executive Summary — static, above filters
    summary
      ? React.createElement('div',{style:{background:"linear-gradient(135deg,"+C.dark+" 0%,"+C.darkMid+" 100%)",borderRadius:14,padding:"24px 28px",marginBottom:24}},
          React.createElement('p',{style:{fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",color:"#475569",fontFamily:"'DM Mono',monospace",margin:"0 0 14px"}},"Executive Summary · This Week"),
          React.createElement('p',{style:{fontSize:15,lineHeight:1.85,margin:0,fontFamily:"'Georgia',serif",color:"#cbd5e1"}},summary.content),
          React.createElement('div',{style:{display:"flex",flexWrap:"wrap",gap:24,marginTop:20,paddingTop:16,borderTop:"1px solid rgba(255,255,255,0.07)"}},
            [{label:"Insights",value:String(insights.length)},{label:"Corroborated",value:corroborated+" / "+insights.length},{label:"Period",value:"Last 7 days"}]
            .map(s=>React.createElement('div',{key:s.label},
              React.createElement('div',{style:{fontSize:18,fontWeight:700,color:"#f8fafc",fontFamily:"'DM Sans',sans-serif"}},s.value),
              React.createElement('div',{style:{fontSize:10,color:"#475569",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:"0.06em",marginTop:2}},s.label)
            ))
          )
        )
      : React.createElement('div',{style:{background:"linear-gradient(135deg,"+C.dark+" 0%,"+C.darkMid+" 100%)",borderRadius:14,padding:"24px 28px",marginBottom:24}},
          React.createElement('p',{style:{fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",color:"#475569",fontFamily:"'DM Mono',monospace",margin:"0 0 14px"}},"Executive Summary · This Week"),
          React.createElement('p',{style:{fontSize:14,color:"#475569",fontFamily:"'Georgia',serif",fontStyle:"italic"}},"Summary generates daily at 7am GST. Check back tomorrow morning.")
        ),

    // Search
    React.createElement(SearchBar,{value:search,onChange:setSearch,placeholder:"Search headlines and analysis..."}),

    // Filters
    React.createElement('div',{style:{marginBottom:14}},
      React.createElement('span',{style:{fontSize:10,color:C.subtle,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:8}},"Market — select multiple"),
      React.createElement('div',{style:{display:"flex",flexWrap:"wrap",gap:6}},
        MARKETS.map(m=>{
          const active = m.id==="all"?market==="all":market===m.id;
          return React.createElement('button',{key:m.id,onClick:()=>setMarket(m.id),style:{
            padding:"4px 12px",borderRadius:20,fontSize:12,fontWeight:600,cursor:"pointer",
            fontFamily:"'DM Mono',monospace",border:active?"none":"1px solid "+C.border,
            background:active?C.dark:C.surface,color:active?"#f8fafc":C.muted,transition:"all 0.15s"
          }},m.label);
        })
      )
    ),
    React.createElement('div',{style:{marginBottom:14}},
      React.createElement('span',{style:{fontSize:10,color:C.subtle,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:8}},"Filter by company"),
      React.createElement('div',{style:{display:"flex",flexWrap:"wrap",gap:6}},
        COMPANIES.map(c=>{
          const active = company===c;
          return React.createElement('button',{key:c,onClick:()=>setCompany(c),style:{
            padding:"4px 12px",borderRadius:20,fontSize:12,fontWeight:600,cursor:"pointer",
            fontFamily:"'DM Mono',monospace",border:active?"none":"1px solid "+C.border,
            background:active?C.dark:C.surface,color:active?"#f8fafc":C.muted,transition:"all 0.15s"
          }},c);
        })
      )
    ),

    // Sort toggle
    React.createElement('div',{style:{display:"flex",alignItems:"center",gap:10,marginBottom:16}},
      React.createElement('div',{style:{display:"inline-flex",borderRadius:8,overflow:"hidden",border:"1px solid "+C.border}},
        React.createElement('button',{onClick:()=>setSortBy("latest"),style:{padding:"6px 14px",border:"none",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",background:sortBy==="latest"?C.dark:C.surface,color:sortBy==="latest"?"#f8fafc":C.muted}},"Latest first"),
        React.createElement('button',{onClick:()=>setSortBy("relevant"),style:{padding:"6px 14px",border:"none",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",background:sortBy==="relevant"?"#1d4ed8":C.surface,color:sortBy==="relevant"?"#f8fafc":C.muted,borderLeft:"1px solid "+C.border}},"Most relevant")
      )
    ),

    // Results label
    React.createElement('p',{style:{fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",color:C.subtle,fontFamily:"'DM Mono',monospace",marginBottom:12}},
      loading?"Loading...":filtered.length+" insight"+(filtered.length!==1?"s":"")+(company!=="All"?" · "+company:"")+(market!=="all"?" · "+(mObj?mObj.label:""):"")
    ),

    // Insights
    loading
      ? React.createElement('div',{className:"loading"},"Fetching latest intelligence...")
      : filtered.length===0
        ? React.createElement('div',{style:{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:28,textAlign:"center"}},
            React.createElement('p',{style:{fontSize:14,color:C.muted,fontFamily:"'DM Sans',sans-serif"}},search?"No results for \""+search+"\". Try different keywords.":"No stories match your current filters.")
          )
        : React.createElement('div',{style:{display:"flex",flexDirection:"column",gap:10}},
            filtered.map(insight=>React.createElement(InsightCard,{
              key:insight.id,
              insight:{...insight, sources: articleMap[insight.id]||[]},
              saved:bookmarks.includes(insight.id),
              onBookmark,
              expanded:expanded===insight.id,
              onExpand:()=>setExpanded(expanded===insight.id?null:insight.id)
            }))
          )
  );
}

// ─── SNAPSHOT TAB ─────────────────────────────────────────────────────────────
const QUARTERS = [
  {key:"Q1 2026",label:"Q1 2026",months:["January 2026","February 2026","March 2026"]},
  {key:"Q2 2026",label:"Q2 2026",months:["April 2026","May 2026","June 2026"]},
  {key:"Q3 2026",label:"Q3 2026",months:["July 2026","August 2026","September 2026"]},
  {key:"Q4 2026",label:"Q4 2026",months:["October 2026","November 2026","December 2026"]},
];

const ALL_MONTHS = [
  {key:"January 2026",label:"Jan'26",quarter:"Q1 2026"},
  {key:"February 2026",label:"Feb'26",quarter:"Q1 2026"},
  {key:"March 2026",label:"Mar'26",quarter:"Q1 2026"},
  {key:"April 2026",label:"Apr'26",quarter:"Q2 2026"},
  {key:"May 2026",label:"May'26",quarter:"Q2 2026"},
];

const PERIOD_RANGES = {
  'January 2026':  ['2026-01-01','2026-02-01'],
  'February 2026': ['2026-02-01','2026-03-01'],
  'March 2026':    ['2026-03-01','2026-04-01'],
  'April 2026':    ['2026-04-01','2026-05-01'],
  'May 2026':      ['2026-05-01','2026-06-01'],
  'Q1 2026':       ['2026-01-01','2026-04-01'],
  'Q2 2026':       ['2026-04-01','2026-07-01'],
};

function SnapshotTab() {
  const [activeQuarter,setActiveQuarter] = useState(null); // null = YTD
  const [activeMonth,setActiveMonth] = useState(null);
  const [markets,setMarkets] = useState([]); // multi-select
  const [companies,setCompanies] = useState([]); // multi-select
  const [search,setSearch] = useState("");
  const [summary,setSummary] = useState(null);
  const [insights,setInsights] = useState([]);
  const [articleMap,setArticleMap] = useState({});
  const [loading,setLoading] = useState(true);
  const [expanded,setExpanded] = useState(null);

  // Determine active period key
  const activePeriod = activeMonth || activeQuarter; // null = YTD

  // Which months are enabled given quarter selection
  const enabledMonths = activeQuarter
    ? ALL_MONTHS.filter(m=>m.quarter===activeQuarter)
    : ALL_MONTHS;

  // Quarter tab click
  const handleQuarterClick = (qkey) => {
    if(activeQuarter===qkey) { setActiveQuarter(null); setActiveMonth(null); } // deselect = YTD
    else { setActiveQuarter(qkey); setActiveMonth(null); }
  };

  // Month tab click
  const handleMonthClick = (mkey) => {
    const month = ALL_MONTHS.find(m=>m.key===mkey);
    if(!month) return;
    // If clicking month in a different quarter, switch quarter too
    if(activeMonth===mkey) { setActiveMonth(null); } // deselect month, stay on quarter
    else { setActiveMonth(mkey); setActiveQuarter(month.quarter); }
  };

  // Toggle multi-select market
  const toggleMarket = (id) => {
    if(id==="all") { setMarkets([]); return; }
    setMarkets(prev=>prev.includes(id)?prev.filter(m=>m!==id):[...prev,id]);
  };

  // Toggle multi-select company
  const toggleCompany = (c) => {
    if(c==="All") { setCompanies([]); return; }
    setCompanies(prev=>prev.includes(c)?prev.filter(x=>x!==c):[...prev,c]);
  };

  useEffect(()=>{
    async function load() {
      setLoading(true);
      setExpanded(null);
      setArticleMap({});

      // Fetch summary if specific period selected
      if(activePeriod) {
        const {data:s} = await sb.from('summaries').select('*').eq('period_label',activePeriod).single();
        setSummary(s||null);
      } else {
        setSummary(null);
      }

      // Build insights query
      let query = sb.from('insights').select('*').order('relevance_score',{ascending:false}).limit(200);
      if(activePeriod && PERIOD_RANGES[activePeriod]) {
        const [from,to] = PERIOD_RANGES[activePeriod];
        query = query.gte('period_start',from).lt('period_start',to);
      } else {
        // YTD — all 2026
        query = query.gte('period_start','2026-01-01').lt('period_start','2027-01-01');
      }

      const {data:ins} = await query;
      setInsights(ins||[]);

      // Load source articles
      if(ins&&ins.length>0) {
        const ids = ins.map(i=>i.id);
        const {data:links} = await sb.from('insight_articles').select('insight_id,article_id').in('insight_id',ids);
        if(links&&links.length>0) {

                  sec&&sec.value!=="N/A"&&React.createElement('div',{style:{fontSize:10,color:sec.value&&sec.value.startsWith("-")?"#dc2626":"#16a34a",fontFamily:"'DM Mono',monospace"}},sec.value+" "+secLabel)
                )
              ),
              React.createElement('div',{style:{height:8,background:C.faint,borderRadius:4,overflow:"hidden"}},
                React.createElement('div',{style:{width:pct+"%",height:"100%",borderRadius:4,background:C.dark,transition:"width 0.4s ease"}})
              )

          }),
      React.createElement('div',{style:{display:"flex",gap:16,marginTop:14,paddingTop:12,borderTop:"1px solid "+C.faint}},
        React.createElement('div',{style:{display:"flex",alignItems:"center",gap:5,fontSize:11,color:C.muted,fontFamily:"'DM Mono',monospace"}},
          React.createElement('span',{style:{fontStyle:"italic"}}),"est. = third-party estimate · no label = reported figure · N/A companies not shown"
        )
      )
    ),

    // Quarterly chart
    React.createElement('div',{style:{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:"18px",marginBottom:20}},
      React.createElement('p',{style:{fontSize:10,color:C.subtle,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}},"Quarterly trend — Revenue & EBITDA ($M)"),
      React.createElement('p',{style:{fontSize:11,color:C.subtle,fontFamily:"'DM Mono',monospace",margin:"0 0 12px"}},"Revenue (bars) · EBITDA (line) · Publicly listed companies only"),
      React.createElement('div',{style:{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}},
        BENCH_COMPANIES.map(co=>{
          const hasData = !!(QUARTERLY_DATA[co.name]&&QUARTERLY_DATA[co.name].some(d=>d.revenue!==null));
          return React.createElement('button',{key:co.name,
            onClick:()=>hasData&&setChartCompany(co.name),
            style:{padding:"4px 12px",borderRadius:20,fontSize:12,fontWeight:600,
              fontFamily:"'DM Mono',monospace",
              border:chartCompany===co.name?"none":"1px solid "+C.border,
              background:chartCompany===co.name?C.dark:C.surface,
              color:chartCompany===co.name?"#f8fafc":C.muted,
              cursor:hasData?"pointer":"default",opacity:hasData?1:0.4}},
            co.flag+" "+co.name+(hasData?"":" (private)")
          );
        })
      ),
      !hasChartData
        ? React.createElement('div',{style:{padding:"32px 0",textAlign:"center"}},
            React.createElement('p',{style:{fontSize:13,color:C.muted,fontFamily:"'Georgia',serif",fontStyle:"italic"}},"Quarterly data not publicly available for "+chartCompany+". This company does not disclose quarterly financials."))
        : React.createElement('div',null,
            React.createElement('div',{style:{position:"relative",width:"100%",height:"220px"}},
              React.createElement('canvas',{
                id:"qChart_"+chartCompany,
                ref:el=>{
                  if(!el)return;
                  if(el._chartInstance){el._chartInstance.destroy();}
                  const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
                  const gridColor=isDark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.06)';
                  const textColor=isDark?'#94a3b8':'#64748b';
                  el._chartInstance=new window.Chart(el,{
                    data:{
                      labels:cData.map(d=>d.q),
                      datasets:[
                        {type:'bar',label:'Revenue ($M)',data:cData.map(d=>d.revenue),backgroundColor:'#3b82f6',borderRadius:3,yAxisID:'y',order:2},
                        {type:'line',label:'EBITDA ($M)',data:cData.map(d=>d.ebitda),borderColor:'#f59e0b',backgroundColor:'#f59e0b',borderWidth:2,pointRadius:4,pointBackgroundColor:'#f59e0b',tension:0.3,yAxisID:'y2',order:1}
                      ]
                    },
                    options:{
                      responsive:true,maintainAspectRatio:false,
                      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': $'+ctx.parsed.y+'M'}}},
                      scales:{
                        x:{ticks:{color:textColor,font:{size:10},autoSkip:false},grid:{color:gridColor}},
                        y:{position:'left',ticks:{color:'#3b82f6',font:{size:10},callback:v=>'$'+v+'M'},grid:{color:gridColor},title:{display:true,text:'Revenue',color:'#3b82f6',font:{size:10}}},
                        y2:{position:'right',ticks:{color:'#f59e0b',font:{size:10},callback:v=>'$'+v+'M'},grid:{drawOnChartArea:false},title:{display:true,text:'EBITDA',color:'#f59e0b',font:{size:10}}}
                      }
                    }
                  });
                }
              })
            ),
            React.createElement('div',{style:{display:"flex",gap:16,marginTop:10,paddingTop:10,borderTop:"1px solid "+C.faint,flexWrap:"wrap"}},
              React.createElement('div',{style:{display:"flex",alignItems:"center",gap:5,fontSize:11,color:C.muted,fontFamily:"'DM Mono',monospace"}},
                React.createElement('div',{style:{width:10,height:10,borderRadius:2,background:"#3b82f6"}}),
                "Revenue ($M) — left axis"
              ),
              React.createElement('div',{style:{display:"flex",alignItems:"center",gap:5,fontSize:11,color:C.muted,fontFamily:"'DM Mono',monospace"}},
                React.createElement('div',{style:{width:18,height:2,borderRadius:1,background:"#f59e0b"}}),
                React.createElement('div',{style:{width:6,height:6,borderRadius:"50%",background:"#f59e0b"}}),
                "EBITDA ($M) — right axis"
              )
            )
          )
    ),

    // Expandable company cards
    React.createElement('p',{style:{fontSize:10,color:C.subtle,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10}},"Tap for full details"),
    BENCH_COMPANIES.map(co=>React.createElement('div',{key:co.name,style:{border:"1px solid "+C.border,borderRadius:12,marginBottom:8,overflow:"hidden",background:C.surface}},
      React.createElement('div',{style:{padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"},
        onClick:()=>setSelected(selected===co.name?null:co.name)},
        React.createElement('div',{style:{display:"flex",alignItems:"center",gap:8}},
          React.createElement('span',{style:{fontSize:20}},co.flag),
          React.createElement('div',null,
            React.createElement('div',{style:{display:"flex",alignItems:"center",gap:6}},
              React.createElement('span',{style:{fontSize:14,fontWeight:700,color:C.dark,fontFamily:"'DM Sans',sans-serif"}},co.name),
              React.createElement('span',{style:{fontSize:9,fontWeight:700,padding:"1px 5px",borderRadius:3,background:co.listed?"#dcfce7":"#f1f5f9",color:co.listed?"#16a34a":"#64748b"}},co.listed?"PUBLIC":"PRIVATE")
            ),
            React.createElement('span',{style:{fontSize:11,color:C.subtle,fontFamily:"'DM Mono',monospace"}},co.country+" · "+co.exchange)
          )
        ),
        React.createElement('div',{style:{display:"flex",alignItems:"center",gap:8}},
          React.createElement('span',{style:{fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:20,background:AVAIL_COLOR[co.availability]+"20",color:AVAIL_COLOR[co.availability],fontFamily:"'DM Mono',monospace"}},AVAIL_LABEL[co.availability]+" data"),
          React.createElement('span',{style:{color:C.border,fontSize:14,transform:selected===co.name?"rotate(180deg)":"none",transition:"transform 0.2s"}},"⌄")
        )
      ),
      selected===co.name&&React.createElement('div',{style:{padding:"0 16px 16px",borderTop:"1px solid "+C.faint}},
        [
          {label:"GMV (MEATR)",metric:co.gmv,growth:co.gmv_growth},
          {label:"FY2025 Revenue",metric:co.fy2025_revenue,growth:co.fy2025_growth},
          {label:"Q1 2026 Revenue",metric:co.q1_2026_revenue,growth:co.q1_2026_growth},
          {label:"FY2025 EBITDA",metric:co.fy2025_ebitda,margin:co.fy2025_ebitda_margin},
          {label:"Q1 2026 EBITDA",metric:co.q1_2026_ebitda,margin:co.q1_2026_ebitda_margin},
        ].map(row=>React.createElement('div',{key:row.label,style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"10px 0",borderBottom:"1px solid #f8fafc"}},
          React.createElement('span',{style:{fontSize:10,color:C.muted,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:"0.06em"}},row.label),
          React.createElement('div',{style:{textAlign:"right"}},
            !row.metric||row.metric.value==="N/A"
              ?React.createElement('span',{style:{fontSize:12,color:"#94a3b8",fontFamily:"'DM Mono',monospace"}},"Not disclosed")
              :React.createElement(React.Fragment,null,
                React.createElement('div',{style:{display:"flex",alignItems:"center",gap:4,justifyContent:"flex-end"}},
                  React.createElement('span',{style:{fontSize:13,fontWeight:700,color:C.dark,fontFamily:"'DM Mono',monospace"}},row.metric.value),
                  row.metric.est&&React.createElement('span',{style:{fontSize:10,color:C.muted,fontFamily:"'DM Mono',monospace",fontStyle:"italic"}},"est.")
                ),
                row.growth&&row.growth.value!=="N/A"&&React.createElement('div',{style:{fontSize:11,color:"#16a34a",fontFamily:"'DM Mono',monospace"}},row.growth.value+" YoY"),
                row.margin&&row.margin.value!=="N/A"&&React.createElement('div',{style:{fontSize:11,color:C.muted,fontFamily:"'DM Mono',monospace"}},row.margin.value+" margin"),
                row.metric.note&&React.createElement('div',{style:{fontSize:10,color:"#94a3b8",fontFamily:"'DM Mono',monospace",marginTop:2}},row.metric.note),
                row.metric.source&&React.createElement('div',{style:{fontSize:10,color:"#3b82f6",fontFamily:"'DM Mono',monospace",marginTop:2}},"Source: "+row.metric.source)
              )
          )
        )),
        co.note&&React.createElement('div',{style:{marginTop:10,padding:"8px 10px",background:C.faint,borderRadius:8}},
          React.createElement('p',{style:{fontSize:11,color:C.muted,fontFamily:"'Georgia',serif",fontStyle:"italic",margin:0}},"💡 "+co.note)
        )
      )
    ))
  );
}

// ─── BOOKMARKS TAB ────────────────────────────────────────────────────────────
function BookmarksTab({bookmarks,onBookmark}) {
  const [insights,setInsights] = useState([]);
  const [loading,setLoading] = useState(true);
  const [expanded,setExpanded] = useState(null);

  useEffect(()=>{
    if(bookmarks.length===0){setInsights([]);setLoading(false);return;}
    sb.from('insights').select('*').in('id',bookmarks).then(({data})=>{
      setInsights(data||[]);
      setLoading(false);
    });
  },[bookmarks]);

  const tagFreq = {};
  insights.forEach(i=>{if(i.competitor){tagFreq[i.competitor]=(tagFreq[i.competitor]||0)+1;}});
  const total = Object.values(tagFreq).reduce((a,b)=>a+b,0)||1;

  return React.createElement('div',{style:{maxWidth:720,margin:"0 auto"}},
    React.createElement('div',{style:{marginBottom:24}},
      React.createElement('p',{style:{fontSize:11,color:C.subtle,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 0 4px"}},"Your Library"),
      React.createElement('h2',{style:{fontSize:22,fontWeight:700,color:C.dark,margin:0,fontFamily:"'DM Sans',sans-serif"}},"Bookmarks")
    ),
    insights.length>0&&React.createElement('div',{style:{background:"linear-gradient(135deg,"+C.dark+" 0%,"+C.darkMid+" 100%)",borderRadius:14,padding:"22px 26px",marginBottom:24}},
      React.createElement('p',{style:{fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",color:"#475569",fontFamily:"'DM Mono',monospace",margin:"0 0 12px"}},"What your saves say about your interests"),
      React.createElement('p',{style:{fontSize:14,lineHeight:1.75,color:"#cbd5e1",fontFamily:"'Georgia',serif",margin:"0 0 18px"}},
        "Based on "+insights.length+" saved article"+(insights.length!==1?"s":"")+", you are tracking: "+Object.entries(tagFreq).map(([k,v])=>k+" ("+Math.round(v/total*100)+"%)").join(", ")+"."),
      React.createElement('div',{style:{display:"flex",flexDirection:"column",gap:8}},
        Object.entries(tagFreq).map(([tag,count])=>React.createElement('div',{key:tag,style:{display:"flex",alignItems:"center",gap:12}},
          React.createElement('span',{style:{fontSize:11,color:"#94a3b8",fontFamily:"'DM Mono',monospace",width:120,flexShrink:0}},tag),
          React.createElement('div',{style:{flex:1,height:6,background:"rgba(255,255,255,0.08)",borderRadius:3,overflow:"hidden"}},
            React.createElement('div',{style:{width:(count/total*100)+"%",height:"100%",background:"#3b82f6",borderRadius:3}})
          ),
          React.createElement('span',{style:{fontSize:11,color:"#64748b",fontFamily:"'DM Mono',monospace",width:32,textAlign:"right"}},Math.round(count/total*100)+"%")
        ))
      )
    ),
    loading
      ?React.createElement('div',{className:"loading"},"Loading bookmarks...")
      :insights.length===0
        ?React.createElement('div',{style:{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:28,textAlign:"center"}},
            React.createElement('p',{style:{fontSize:14,color:C.muted,fontFamily:"'DM Sans',sans-serif"}},"No bookmarks yet. Star stories on the Latest tab to save them here."))
        :React.createElement('div',{style:{display:"flex",flexDirection:"column",gap:8}},
            insights.map(insight=>React.createElement(InsightCard,{
              key:insight.id,insight,
              saved:true,onBookmark,
              expanded:expanded===insight.id,
              onExpand:()=>setExpanded(expanded===insight.id?null:insight.id)
            }))
          )
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [activeTab,setActiveTab] = useState("today");
  const [bookmarks,setBookmarks] = useState([]);

  const toggleBookmark = id=>setBookmarks(prev=>prev.includes(id)?prev.filter(b=>b!==id):[...prev,id]);

  const tabs = [
    {id:"today",label:"Latest"},
    {id:"snapshot",label:"Snapshot"},
    {id:"benchmarks",label:"Market Data"},
    {id:"saved",label:"Bookmarks"+(bookmarks.length>0?" ("+bookmarks.length+")":"")},
  ];

  return React.createElement('div',{style:{minHeight:"100vh",background:C.bg,fontFamily:"'DM Sans',sans-serif"}},
    React.createElement('div',{style:{position:"sticky",top:0,zIndex:10,background:"#0f172a",boxShadow:"0 2px 12px rgba(0,0,0,0.25)"}},
      React.createElement('div',{style:{padding:"14px 24px 0",display:"flex",alignItems:"center",justifyContent:"space-between"}},
        React.createElement('span',{style:{fontSize:16,fontWeight:800,color:"#f8fafc",fontFamily:"'DM Sans',sans-serif",letterSpacing:"-0.03em"}},
          "MENA",React.createElement('span',{style:{color:"#3b82f6"}},"intel")
        ),
        React.createElement('span',{style:{fontSize:10,color:"#475569",fontFamily:"'DM Mono',monospace",letterSpacing:"0.06em",textTransform:"uppercase"}},
          new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})
        )
      ),
      React.createElement('div',{style:{display:"flex",overflowX:"auto",padding:"0 24px",gap:4,scrollbarWidth:"none"}},
        tabs.map(tab=>React.createElement('button',{key:tab.id,onClick:()=>setActiveTab(tab.id),style:{
          padding:"12px 16px",border:"none",background:"none",
          fontSize:14,fontWeight:activeTab===tab.id?700:500,
          color:activeTab===tab.id?"#f8fafc":"#64748b",
          cursor:"pointer",fontFamily:"'DM Sans',sans-serif",whiteSpace:"nowrap",
          borderBottom:activeTab===tab.id?"3px solid #3b82f6":"3px solid transparent",
          transition:"all 0.15s"
        }},tab.label))
      )
    ),
    React.createElement('div',{style:{padding:"32px 24px 60px"}},
      activeTab==="today"&&React.createElement(LatestTab,{bookmarks,onBookmark:toggleBookmark}),
      activeTab==="snapshot"&&React.createElement(SnapshotTab,null),
      activeTab==="benchmarks"&&React.createElement(MarketDataTab,null),
      activeTab==="saved"&&React.createElement(BookmarksTab,{bookmarks,onBookmark:toggleBookmark})
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
